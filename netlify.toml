[[redirects]]
  from = "/service-repair"
  to = "/service-repair.html"
  status = 200

[[redirects]]
  from = "/service-replacement"
  to = "/service-replacement.html"
  status = 200

[[redirects]]
  from = "/service-installation"
  to = "/service-installation.html"
  status = 200

[[redirects]]
  from = "/service-tuneup"
  to = "/service-tuneup.html"
  status = 200

[[redirects]]
  from = "/service-iaq"
  to = "/service-iaq.html"
  status = 200

[[redirects]]
  from = "/air-care"
  to = "/air-care.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
