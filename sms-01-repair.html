function render(){const card=document.getElementById('card');if(state.step===1)card.innerHTML=renderStep1();else if(state.step===2){card.innerHTML=renderStep2();focusNext('f-name',goName);}else if(state.step===3){card.innerHTML=renderStep3();setupPhone();}else if(state.step===4){card.innerHTML=renderStep4();focusNext('f-zip',goZip);}else card.innerHTML=renderSuccess();}
function focusNext(id,fn){const el=document.getElementById(id);if(!el)return;el.focus();el.addEventListener('keydown',e=>{if(e.key==='Enter')fn();});}
function setupPhone(){const el=document.getElementById('f-phone');if(!el)return;el.focus();el.addEventListener('input',e=>{let v=e.target.value.replace(/\D/g,'').slice(0,10);if(v.length>=6)v='('+v.slice(0,3)+') '+v.slice(3,6)+'-'+v.slice(6);else if(v.length>=3)v='('+v.slice(0,3)+') '+v.slice(3);e.target.value=v;});el.addEventListener('keydown',e=>{if(e.key==='Enter')goPhone();});}
function selectIssue(label,btn){state.issue=label;document.querySelectorAll('.issue-primary,.issue-secondary,.issue-sm').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById('btn1').disabled=false;}
function go(step){state.step=step;render();}
function goName(){const v=document.getElementById('f-name').value.trim();if(!v){shake('f-name');return;}state.name=v;go(3);}
function goPhone(){const v=document.getElementById('f-phone').value.replace(/\D/g,'');if(v.length<10){shake('f-phone');return;}state.phone=document.getElementById('f-phone').value;go(4);}
function goZip(){const v=document.getElementById('f-zip').value.replace(/\D/g,'');if(v.length<5){shake('f-zip');return;}state.zip=v;submitLead();}
function shake(id){const el=document.getElementById(id);if(!el)return;el.style.borderColor='#F75600';el.style.animation='shake 0.3s ease';setTimeout(()=>{el.style.animation='';el.style.borderColor='';},400);}
async function submitLead(){
  try{
    const res = await fetch('/api/submit-lead',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        firstName: state.name,
        phone: state.phone,
        zip_code: state.zip,
        issue: state.issue,
        service: SERVICE,
        source: SOURCE,
        source_page: SOURCE
      })
    });
    const json = await res.json().catch(()=>({}));
    console.log('Lead submitted:',json);
  }catch(e){
    console.error('Submit error:',e);
  }
  gtagConversion();
  state.step=5;
  render();
}
render();
</script>
